name = "company-control-panel"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "control-panel-registry"
database_id = "REPLACE_AFTER_CREATION"

# Environment variables — set all secrets in Cloudflare Pages dashboard
# (Settings → Environment Variables), NOT here:
#   CF_API_TOKEN, CF_ACCOUNT_ID, CF_ZONE_ID
